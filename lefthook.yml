pre-commit:
  parallel: true
  jobs:
    - name: format-check
      glob: "*.{ts,tsx,js,jsx,mjs,cjs,json}"
      run: pnpm exec biome format {staged_files}

    - name: lint
      env:
        SKIP_ENV_VALIDATION: "1"
      run: pnpm lint

    - name: typecheck
      run: pnpm typecheck

pre-push:
  jobs:
    - name: typecheck
      run: pnpm typecheck

    - name: lint-all
      env:
        SKIP_ENV_VALIDATION: "1"
      run: pnpm lint
